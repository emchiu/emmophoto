<!DOCTYPE html>
<html>

<head>
  <title>emmo photo</title>

<style>

body {
  font-family: Arial;
  margin: 40px;
  background: #fafafa;
}

h1 {
  text-align: center;
}

h2 {
  text-align: center;
  margin-top: 80px;
  margin-bottom: 20px;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: lowercase;

  display: flex;
  align-items: center;
  justify-content: center;
}

h2::before,
h2::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #ccc;
  margin: 0 15px;
}

.section {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.section-hero {
  width: 100%;
  max-width: 1000px;
  display: block;
  margin: 20px auto;
  border-radius: 0px;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

.hero {
  text-align: center;
  margin-bottom: 50px;
}

.hero img {
  max-width: 300px;
  width: 100%;
  border-radius: 0px;
}

.hero p {
  color: #666;
  margin-bottom: 20px;
}

.gallery {
  display: block; /* Masonry takes over */
}

.gallery-item {
  width: calc(33.333% - 10px);
  margin-bottom: 10px;
}

.gallery img {
  width: 100%;
  display: block;
}

.gallery img:hover {
  transform: scale(1.02);
}

@media (max-width: 800px) {
  .gallery-item {
    width: calc(50% - 10px);
  }
}

@media (max-width: 500px) {
  .gallery-item {
    width: 100%;
  }
}

/* lightbox */

#lightbox {
  position: fixed;
  display: none;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.95);
  z-index: 1000;
}

#lightbox img {
  display:block;
  max-width:90%;
  max-height:80%;
  margin:5% auto;
}

#close, #prev, #next {
  position: absolute;
  color: white;
  font-size: 40px;
  cursor: pointer;
  user-select: none;
}

#close {
  top: 20px;
  right: 30px;
}

#prev {
  top: 50%;
  left: 30px;
  transform: translateY(-50%);
}

#next {
  top: 50%;
  right: 30px;
  transform: translateY(-50%);
}

</style>
</head>

<body>

<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

<div class="hero">
  <h1>emmo photo</h1>
  <img src="photos/featured.jpg">
</div>

<div id="gallery-container"></div>

<!-- Lightbox -->
<div id="lightbox">
  <span id="close">&times;</span>
  <span id="prev">&#10094;</span>
  <img id="lightbox-img">
  <span id="next">&#10095;</span>
</div>

<script>

const username = "emchiu"
const repo = "emmochiu.github.io"
const baseFolder = "photos"

const sections = [
  {
    title: "canyonlands | mar 2026",
    folder: "2026_03_utah",
    hero: "cover.jpg",
    images: ["000053180009.jpg",
              "000053180010.jpg",
              "000053180013.jpg",
              "000053180014.jpg",
              "000053180015.jpg",
              "000053180016.jpg", 
              "000053180017.jpg",
              "000053180021.jpg",
              "000053180022.jpg",
              "000053180024.jpg",
              "000053180025.jpg",
            ]
  },
  {
    title: "sf chinatown | lny 2026",
    folder: "2026_03_chinatown",
    hero: "cover.jpg",
    images: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg"]
  },
  {
    title: "bay area | jan-mar 2026",
    folder: "2026_03_bay_area",
    hero: "cover.jpg",
    images: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg","8.jpg","9.jpg","10.jpg"]
  },
  {
    title: "chicago | summertime 2025",
    folder: "2025_08_chicago",
    hero: "cover.jpg",
    images: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg","8.jpg"]
  },
  {
    title: "sf | may 2025",
    folder: "2025_05_bay_area",
    hero: "cover.jpg",
    images: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg"]
  },
  {
    title: "torres del paine | mar 2025",
    folder: "2025_03_torres_del_paine",
    hero: "cover.jpg",
    images: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg","8.jpg","9.jpg","10.jpg"]
  }
]

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible")
    }
  })
}, {
  threshold: 0.1
})

const container = document.getElementById("gallery-container")

let currentImages = []
let currentIndex = 0

function openLightbox(images, index) {
  currentImages = images
  currentIndex = index

  document.getElementById("lightbox").style.display = "block"
  document.getElementById("lightbox-img").src = currentImages[currentIndex]
}

function showNext() {
  currentIndex = (currentIndex + 1) % currentImages.length
  document.getElementById("lightbox-img").src = currentImages[currentIndex]
}

function showPrev() {
  currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length
  document.getElementById("lightbox-img").src = currentImages[currentIndex]
}

sections.forEach(section => {

  const sectionDiv = document.createElement("div")
  sectionDiv.className = "section"
  container.appendChild(sectionDiv)

  const title = document.createElement("h2")
  title.textContent = section.title
  sectionDiv.appendChild(title)

  const heroImg = document.createElement("img")
  heroImg.src = `https://raw.githubusercontent.com/${username}/${repo}/main/${baseFolder}/${section.folder}/${section.hero}`
  heroImg.className = "section-hero"
  sectionDiv.appendChild(heroImg)

  const gallery = document.createElement("div")
  gallery.className = "gallery"
  sectionDiv.appendChild(gallery)

  const imageUrls = section.images.map(filename =>
    `https://raw.githubusercontent.com/${username}/${repo}/main/${baseFolder}/${section.folder}/${filename}`
  )

  section.images.forEach((filename, index) => {

    const img = document.createElement("img")
    img.src = imageUrls[index]

    img.onclick = () => {
      openLightbox(imageUrls, index)
    }

    const item = document.createElement("div")
    item.className = "gallery-item"

    item.appendChild(img)
    gallery.appendChild(item)

  })

  // ✅ Masonry init
  imagesLoaded(gallery, function () {
    new Masonry(gallery, {
      itemSelector: '.gallery-item',
      columnWidth: '.gallery-item',
      percentPosition: true,
      gutter: 10
    })
  })

})

setTimeout(() => {
  document.querySelectorAll(".section").forEach(section => {
    observer.observe(section)
  })
}, 500)

document.getElementById("close").onclick = () => {
  document.getElementById("lightbox").style.display = "none"
}

document.getElementById("next").onclick = showNext
document.getElementById("prev").onclick = showPrev

document.addEventListener("keydown", (e) => {
  const lightbox = document.getElementById("lightbox")

  if (lightbox.style.display === "block") {
    if (e.key === "ArrowRight") showNext()
    if (e.key === "ArrowLeft") showPrev()
    if (e.key === "Escape") lightbox.style.display = "none"
  }
})




</script>

</body>
</html>
