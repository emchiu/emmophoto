<!DOCTYPE html>
<html>

<head>
  <title>emmo photo</title>

<style>

body {
  font-family: Arial;
  margin: 40px;
  background: #fafafa;
}

h1 {
  text-align: center;
}

h2 {
  text-align: center;
  margin-top: 80px;
  margin-bottom: 20px;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;

  display: flex;
  align-items: center;
  justify-content: center;
}

h2::before,
h2::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #ccc;
  margin: 0 15px;
}

h3 {
  text-align: center;
  margin-top: 20px;
  margin-bottom: 20px;
  font-weight: 200;
  letter-spacing: 1px;
  text-transform: lowercase;
}

.section {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

.hero {
  text-align: center;
  margin-bottom: 50px;
}

.hero img {
  max-width: 700px;
  width: 100%;
  border-radius: 8px;
}

.hero p {
  color: #666;
  margin-bottom: 20px;
}

.gallery {
  column-count: 3;
  column-gap: 10px;
}

.gallery img {
  width: 100%;
  margin-bottom: 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.gallery img:hover {
  transform: scale(1.02);
}

@media (max-width: 800px) {
  .gallery { column-count: 2; }
}

@media (max-width: 500px) {
  .gallery { column-count: 1; }
}

/* lightbox */

#lightbox {
  position: fixed;
  display: none;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  z-index: 1000;
}

#lightbox img {
  display:block;
  max-width:90%;
  max-height:90%;
  margin:5% auto;
}

</style>
</head>

<body>

<div class="hero">
  <h1>emmo photo</h1>
  <img src="photos/featured.jpg">
</div>

<div id="gallery-container"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="this.style.display='none'">
  <img id="lightbox-img">
</div>

<script>

const username = "emchiu"
const repo = "emmochiu.github.io"
const baseFolder = "photos"

const sections = [
  {title: "sf chinatown | lny 2026", folder: "2026_03 chinatown"},
  {title: "bay area | jan-mar 2026", folder: "2026_03 bay area"},
  {title: "chicago | summertime 2025", folder: "2025_08 chicago"},
  {title: "sf | may 2025", folder: "2025_05 bay area"},
  {title: "torres del paine | mar 2025", folder: "2025_03 torres del paine"},
  // add more sections here:
  // {title: "Japan Trip", folder: "japan"},
]

const container = document.getElementById("gallery-container")

sections.forEach(section => {

  const sectionDiv = document.createElement("div")
  sectionDiv.className = "section"
  container.appendChild(sectionDiv)

  const title = document.createElement("h2")
  title.textContent = section.title
  sectionDiv.appendChild(title)

  const gallery = document.createElement("div")
  gallery.className = "gallery"
  sectionDiv.appendChild(gallery)

  fetch(`https://api.github.com/repos/${username}/${repo}/contents/${baseFolder}/${section.folder}`)
    .then(response => response.json())
    .then(data => {

      data.forEach(file => {

        if (file.type === "file" && !file.name.includes("featured")) {

          const img = document.createElement("img")
          img.src = file.download_url

          // lightbox click
          img.onclick = () => {
            document.getElementById("lightbox").style.display = "block"
            document.getElementById("lightbox-img").src = img.src
          }

          gallery.appendChild(img)

        }

      })

    })

})

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible")
    }
  })
}, {
  threshold: 0.1
})

document.querySelectorAll(".section").forEach(section => {
  observer.observe(section)
})

</script>

</body>
</html>
